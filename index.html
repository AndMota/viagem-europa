  id:'andorra',name:'Andorra',sub:'',flag:'🇦🇩',country:'Principado de Andorra',color:'#003DA5',
  lang:'Catalão (também castelhano e francês)',card:'Carro próprio · Centro a pé',dates:'17 – 19 Mai',
  greetings:['Bon dia — Bom dia (catalão)','Bona tarda — Boa tarde (catalão)','Gràcies — Obrigado(a) (catalão)','Hola / Gracias — Olá / Obrigado (espanhol, amplamente entendido)','Merci — Obrigado (francês, também entendido)'],
  customs:['Andorra é um co-principado: governado conjuntamente pelo Presidente da França (Macron) e pelo Bispo de Urgell — o único governo diarquico do mundo.','Sem IVA: Andorra cobra apenas 4,5% de imposto (IGI). Shopping é a principal atração para muitos visitantes.','Moeda: Euro, mas sem ser membro da UE.','Altitude: Andorra la Vella fica a 1.023m — a capital mais alta da Europa. Em maio pode ainda fazer frio nas montanhas.','Estações de ski fechadas em maio, mas trilhas abertas com neve ainda presente nos cumes.'],
  gastronomy:['Escudella i Carn d\'Olla — Cozido catalão com carne de porco, carneiro e legumes; prato dos Pirineus','Trinxat — Couve e batata amassadas com bacon; comida de montanha reconfortante','Crema Catalana — Creme de baunilha caramelizado; a versão catalã da crème brûlée','Cargols — Caracóis cozidos com ervas e azeite; parte da culinária pirenáica','Vins d\'Andorra — Produção local pequena mas interessante (DOC Andorra)','Cervesa Borda Raubert — A cerveja artesanal local de Andorra'],
  days:[
   {date:'2026-05-17',dow:'Domingo',label:'Dia 17',theme:'Chegada · Caldea Spa',att:[
    {id:'an-ci',t:'18:00',name:'Check-in em Andorra la Vella',type:'accom',dur:'1h',icon:'🏨',
     tp:'De carro de Barcelona: A-2 → Lleida → N-II → CG-1 (subindo os Pirineus). GPS: Andorra la Vella. Total: ~3h. Estacione no hotel — o centro é a pé.',
     desc:'Andorra la Vella é a capital mais alta da Europa (1.023m). Compacta e caminhável, o centro comercial (Avinguda Meritxell) é uma das ruas de compras com impostos mais baixos do continente.',
     tips:'O hotel geralmente oferece estacionamento gratuito — confirme ao reservar. O centro fica a 5-10 min a pé de qualquer hotel.',
     cur:'Andorra tem o status fiscal negociado em acordos do séc. XIII entre o Conde de Foix e o Bispo de Urgell. A baixa tributação sobreviveu mais de 700 anos.'},
    {id:'an-cal',t:'19:30',name:'Caldea Spa Termal',type:'leisure',dur:'2h',icon:'♨️',
     tp:'A pé do hotel (10-15 min). Caldea fica em Les Escaldes, adjacente a Andorra la Vella.',
     desc:'O maior spa termal dos Pirineus e um dos maiores da Europa. Instalado em torres de vidro modernistas (1994), o complexo tem 6.000 m² de piscinas termais (29-36°C), lagoa exterior com vista para os Pirineus, sauna a vapor, jacuzzis e tratamentos. A água termal tem propriedades minerais únicas das fontes pirenáicas.',
     tips:'Ingresso básico (3h): €36-42. Reserve online para fins de semana. Leve toalha ou alugue (€5). O acesso básico já inclui todas as piscinas termais e saunas — os pacotes premium têm circuito de talassoterapia extra.',
     cur:'Caldea foi eleito melhor spa de montanha da Europa em vários anos. As fontes termais de Les Escaldes foram usadas desde o período romano. A água sai naturalmente do subsolo a 70°C.'}
   ]},
   {date:'2026-05-18',dow:'Segunda-feira',label:'Dia 18',theme:'Shopping, Montanha e Casa de la Vall',att:[
    {id:'an-shop',t:'10:00',name:'Compras em Andorra la Vella',type:'leisure',dur:'2h',icon:'🛍️',
     tp:'A pé do hotel — Avinguda Meritxell é o eixo central.',
     desc:'Andorra é paraíso de compras sem impostos. A Avinguda Meritxell tem lojas de eletrônicos, perfumes, bebidas alcoólicas, tabaco, joias e moda. Preços significativamente mais baixos que na Espanha e França: perfumes (30-50% mais barato), uísques e cognacs raros, câmeras e eletrônicos.',
     tips:'Limite de importação ao Brasil (declaração na alfândega): US$500/pessoa. Itens mais vantajosos: perfumes (Chanel, Dior — até 40% abaixo do Brasil), uísques premium (Macallan, Glenfiddich), câmeras (Sony, Canon). Compare preços antes de comprar.',
     cur:'O status fiscal de Andorra foi negociado em 1278 em acordos entre o Conde de Foix (antecessor da França) e o Bispo de Urgell. Sobreviveu mais de 745 anos de mudanças políticas.'},
    {id:'an-val',t:'12:00',name:'Casa de la Vall — Parlamento Histórico',type:'att',dur:'1h',icon:'🏛️',
     tp:'A pé do centro comercial (10 min para o bairro histórico).',
     desc:'A Casa de la Vall (Casa do Vale) é o edifício histórico mais importante de Andorra — uma casa-torre do séc. XVI que serviu como sede do Parlamento Andorrano de 1702 a 2011. O bairro ao redor tem ruas de pedra medievais.',
     tips:'Visita guiada (verificar horários). A Igreja de Sant Esteve ao lado é a mais antiga de Andorra la Vella. O bairro antigo contrasta muito com o entorno comercial.',
     cur:'Andorra tem o sistema de governo mais peculiar do mundo: seu co-príncipe francês é o Presidente eleito (Macron). Quando Macron deixar o cargo, o próximo presidente também se tornará co-príncipe de Andorra automaticamente.'},
    {id:'an-nat',t:'14:00',name:'Parque Natural de Sorteny',type:'leisure',dur:'3h',icon:'⛰️',
     tp:'De carro: ~30-40 min de Andorra la Vella (direção norte, CG-3). GPS: Parc Natural de la Vall de Sorteny.',
     desc:'Andorra tem natureza de montanha extraordinária — 90% do país é área protegida. O Parque Natural de Sorteny tem trilhas com vistas espetaculares dos Pirineus, flora alpina e, com sorte, avistamento de isards (cabras dos Pirineus). Em maio, a neve recua dos cumes e as flores alpinas começam a brotar.',
     tips:'Trilha até o Estany de l\'Illa (lago de montanha): ~2-3h ida e volta (7 km, 500m de desnível), uma das mais belas vistas de Andorra. Leve calçados fechados — pode haver neve residual. Temperatura nas montanhas em maio: 5-15°C.',
     cur:'Andorra tem 65 lagos de montanha (estanys). No inverno, as estações de ski (Grandvalira e Vallnord) atraem mais de 10 milhões de esquiadores por ano.'},
    {id:'an-jan',t:'19:30',name:'Jantar em Andorra',type:'food',dur:'1h30',icon:'🍽️',
     tp:'A pé do hotel.',
     desc:'Culinária dos Pirineus: trinxat de la Cerdanya, escudella (cozido catalão) e carn d\'olla. A Borda Estevet e a Font dels Meners são restaurantes tradicionais com excelente culinária de montanha.',
     tips:'Compre um ou dois vinhos andorranos para levar — a produção é pequena mas interessante (DOC Andorra). Boa oportunidade de comprar bebidas destiladas duty-free antes de partir amanhã.',
     cur:'A "borda" andorrana é uma casa de campo tradicional dos Pirineus — muitas foram reconvertidas em restaurantes rústicos charmosos que servem a culinária local.'}
   ]},
   {date:'2026-05-19',dow:'Terça-feira',label:'Dia 19',theme:'Descida para Barcelona',att:[
    {id:'an-bcn',t:'10:00',name:'Saída · Viagem para Barcelona',type:'transp',dur:'3h',icon:'🚗',
     tp:'De carro: Andorra la Vella → Barcelona pela N-145 → C-16 → B-30 → Barcelona. Duração: ~2h45 (200 km). Pedágios: ~€15-20. Use o Parkapp para estacionamento em Barcelona.',
     desc:'A viagem de Andorra a Barcelona pela N-145 percorre uma das descidas mais espetaculares dos Pirineus — a serra da Cadí com vistas impressionantes da Catalunha se abrindo abaixo.',
     tips:'Abasteça o carro em Andorra (combustível até 20% mais barato que na Espanha). A passagem pelo Túnel del Cadí (€12,40) encurta o caminho em 1h. Se tiver tempo, pare 30 min em La Seu d\'Urgell — lindo vilarejo medieval.',
     cur:'La Seu d\'Urgell tem uma das mais belas catedrais românicas da Catalunha (séc. XII) e uma pista de canoagem olímpica das Olimpíadas de Barcelona 1992.'}
   ]}
  ]

 {
  id:'barcelona',name:'Barcelona',sub:'',flag:'🇪🇸',country:'Espanha — Catalunha',color:'#A50044',
  lang:'Catalão e Espanhol',card:'T-Casual metrô (€11,35 / 10 viagens) · Aerobús (€6,75)',dates:'19 – 20 Mai',
  greetings:['Hola — Olá (espanhol, universalmente entendido)','Bon dia — Bom dia (catalão)','Gràcies — Obrigado (catalão)','Gracias — Obrigado (espanhol)','On és...? — Onde fica...? (catalão)','La cuenta, por favor — A conta, por favor'],
  customs:['Muitos barceloninos preferem ser chamados de catalães, não espanhóis. Respeite a sensibilidade.','⚠️ Las Ramblas tem nível extremamente alto de carteiristas — guarde carteira e celular com muita atenção.','Jantar: também tardio, entre 21h e 23h. Restaurantes abrem no mínimo às 20h30.','Dizer "gràcies" ao invés de "gracias" é sempre bem recebido pelos locais.'],
  gastronomy:['Pa amb Tomàquet — Pão com tomate esfregado e azeite; o café da manhã catalão fundamental','Fideuà — Como uma paella mas com macarrão; especialidade catalã/valenciana','Patatas Bravas (com aioli) — Em Barcelona, sempre com maionese de alho, não apenas molho picante','Croquetes de Jamón — As melhores: crocantes por fora e cremosas por dentro','Crema Catalana — A versão catalã da crème brûlée','Cervesa Damm — A cerveja local de Barcelona, refrescante para o calor'],
  days:[
   {date:'2026-05-19',dow:'Terça-feira',label:'Dia 19',theme:'Sagrada Família e Bairro Gótico',att:[
    {id:'bc-ci',t:'13:00',name:'Check-in em Barcelona',type:'accom',dur:'1h',icon:'🏨',
     tp:'De carro de Andorra. Estacione no hotel ou num parking próximo (app Parclick). Para metrô: compre T-Casual (10 viagens, €11,35) nas máquinas.',
     desc:'Barcelona: capital da Catalunha, cidade de Gaudí, de praias, gastronomia e arquitetura extraordinária. Com apenas 1 dia, o foco são os pontos essenciais.',
     tips:'Guarde o carro e use metrô e caminhada — o trânsito e o estacionamento em Barcelona são caóticos e caros no centro.',
     cur:'Barcelona foi fundada pelos romanos em 15 a.C. como "Barcino". As muralhas romanas do séc. I d.C. ainda existem e podem ser vistas no Barri Gòtic.'},
    {id:'bc-sf',t:'14:00',name:'Sagrada Família',type:'att',dur:'2h',icon:'⛪',
     tp:'Metrô Linha 2 ou 5 até Sagrada Família.',
     desc:'A obra-prima inacabada de Antoni Gaudí — em construção desde 1882, prevista para conclusão em 2030. As colunas internas se ramificam como árvores, criando uma floresta de pedra que filtra luz colorida dos vitrais. As três fachadas: Nascimento (riquíssima em detalhes), Paixão (abstrata e angustiante) e Glória (em construção).',
     tips:'Ingresso online obrigatório (€26-33). Reserve com MESES de antecedência — esgota com frequência. Subir às torres (adicional) tem vista panorâmica de Barcelona. O interior com colunas arborescentes e vitrais de cores de floresta é a experiência mais extraordinária da cidade.',
     cur:'Gaudí foi atropelado por um bonde em 1926 e morreu 3 dias depois. O ateliê e os modelos da basílica foram destruídos num incêndio em 1936. Arquitetos reconstruíram os planos a partir de fotografias. Construída inteiramente com doações e ingressos — zero dinheiro público.'},
    {id:'bc-got',t:'17:00',name:'Bairro Gótico e Las Ramblas',type:'att',dur:'2h',icon:'🏛️',
     tp:'Metrô Linha 4 de Sagrada Família até Jaume I (15 min).',
     desc:'O Barri Gòtic: labirinto de ruas medievais com a Catedral de Barcelona (séc. XIV), a Plaça Reial (palmeiras e fachadas neoclássicas), o Pont del Bisbe (ponte medieval fotogênica) e restos de muralhas romanas do séc. I d.C. Las Ramblas é o bulevar mais famoso de Barcelona — 1,2 km do centro ao Port Vell, com quiosques, cafés e artistas.',
     tips:'⚠️ ATENÇÃO nas Ramblas: altíssimo nível de carteiristas. Segure bolsa na frente, não use celular nas calçadas. Para tapas de qualidade, vá ao Barri Gòtic ou El Born — muito melhores e menos turísticos.',
     cur:'O Mercat de La Boqueria nas Ramblas foi fundado em 1217. O Barri Gòtic tem ruas medievais com a mesma configuração de mais de 700 anos — e muros romanos de 2.000 anos.'},
    {id:'bc-dj',t:'21:00',name:'Jantar em El Born',type:'food',dur:'1h30',icon:'🍷',
     tp:'A pé do Barri Gòtic (5 min sentido mar).',
     desc:'El Born é o bairro mais cool de Barcelona: galerias, bares de coctéis, restaurantes criativos e a Basílica de Santa Maria del Mar. Para um jantar autêntico catalão, este é o lugar.',
     tips:'El Xampanyet (taberna histórica, excelente cava), Bar del Pla (tapas modernas), Tantarantana (comida catalã). Reserve com antecedência para as 21h.',
     cur:'A Basílica de Santa Maria del Mar (1329-1383) foi construída pelo povo do bairro da Ribera — os carregadores do porto trabalhavam de graça nos dias de folga. É considerada o mais belo gótico catalão.'}
   ]},
   {date:'2026-05-20',dow:'Quarta-feira',label:'Dia 20',theme:'Manhã em Barcelona · Voo para Lisboa',att:[
    {id:'bc-pg',t:'09:00',name:'Park Güell ou Passeig de Gràcia',type:'att',dur:'1h30',icon:'🦎',
     tp:'Park Güell: Metrô Linha 3 até Lesseps + 20 min a pé subindo. Passeig de Gràcia: Metrô Linhas 2/3/4.',
     desc:'Duas opções: Park Güell — o parque de Gaudí com mosaicos coloridos, salamandras e terraço com vista de Barcelona (€10, reserve online, vai de manhã cedo para menos filas). Ou Passeig de Gràcia — a avenida mais glamourosa com a Casa Batlló (€35) e La Pedrera (€28) de Gaudí.',
     tips:'Se o voo for de tarde e tiver pressa: apenas caminhe pelo Passeig de Gràcia e fotografe as fachadas de Gaudí de fora — é grátis e já vale muito.',
     cur:'Gaudí foi atropelado e morto perto do Park Güell em 1926. Por estar vestindo roupas simples, os transeuntes o confundiram com um mendigo — só foi identificado horas depois no hospital.'},
    {id:'bc-fly',t:'11:30',name:'Aeroporto de Barcelona · Voo para Lisboa',type:'transp',dur:'3h30',icon:'✈️',
     tp:'Aerobús: da Plaça de Catalunya até o Aeroporto El Prat T1 ou T2 (35-40 min, €6,75). Ou de carro: devolver na locadora do aeroporto. Voo BCN → LIS. Duração: ~2h.',
     desc:'De Barcelona, voo direto para Lisboa. Em Lisboa: Metrô Linha Vermelha do aeroporto até Alameda → Linha Verde até Cais do Sodré ou Baixa-Chiado (45 min, €1,70). Compre o Cartão Viva Viagem (€0,50) + Zapping.',
     tips:'O Cartão Viva Viagem com Zapping cobre metrô, elétricos, ônibus e ferries (€1,60/viagem). Instale o app Carris/Metropolitano para navegação no transporte público de Lisboa.',
     cur:'Lisboa é a mais ocidental das capitais continentais europeias e uma das mais antigas do mundo — mais antiga que Roma.'}
   ]}
  ]
 },
 {
  id:'lisbon',name:'Lisboa',sub:'',flag:'🇵🇹',country:'Portugal',color:'#006600',
  lang:'Português',card:'Cartão Viva Viagem (€0,50) + Zapping (€1,60/viagem)',dates:'20 – 22 Mai',
  greetings:['Olá / Bom dia — Olá / Bom dia','Obrigado(a) — Thank you','Por favor — Por favor','Com licença — Com licença','Quanto custa? — Quanto custa?','A conta, por favor — A conta, por favor','Boa tarde / Boa noite — Boa tarde / Boa noite'],
  customs:['Lisboa é muito acolhedora com brasileiros — o idioma facilita imensamente, embora o sotaque e vocabulário difiram.','Fado: ir a uma casa de fado em Alfama é uma experiência emocional única — os portugueses levam a sério.','Pastel de Nata: comer um morno, polvilhado de canela, em pé no balcão é um ritual cultural.','Elétrico 28E: icônico mas lotado de turistas e carteiristas. Use o 15E (moderno) para Belém.','Saudade: o conceito português de nostalgia melancólica — central à identidade portuguesa e ao fado.'],
  gastronomy:['Pastel de Nata — Creme de gema de ovo em massa folhada; os originais são da Fábrica de Pastéis de Belém (desde 1837)','Bacalhau à Brás — Bacalhau desfiado com batatas palha, ovos e azeitonas; o mais popular de Lisboa','Bifanas — Sandes (sanduíche) de fatias de porco marinadas; o fast food português por excelência','Sardinhas assadas — Tradicionais nas festas de junho; disponíveis nos restaurantes de Alfama','Ginjinha — Licor de cereja ácida; bebida de rua em coplizinhos por €1-2 nas ginjinhas de Alfama','Caldo Verde — Sopa de couve galega com chouriço; reconfortante e deliciosa'],
  days:[
   {date:'2026-05-20',dow:'Quarta-feira',label:'Dia 20',theme:'Chegada · Baixa e Castelo',att:[
    {id:'li-ci',t:'15:00',name:'Check-in em Lisboa',type:'accom',dur:'1h',icon:'🏨',
     tp:'Do aeroporto (LIS): Metrô Linha Vermelha → Alameda → baldeação Linha Verde → Baixa-Chiado ou Cais do Sodré (45 min, €1,70). Compre Cartão Viva Viagem (€0,50) + Zapping.',
     desc:'Lisboa: construída em 7 colinas sobre o Rio Tejo, com elétricos amarelos, miradouros de tirar o fôlego e uma atmosfera única de cidade entre a nostalgia do passado e a modernidade vibrante. Capital do país que no séc. XV-XVI comandou o maior império marítimo do mundo.',
     tips:'O Viva Viagem com Zapping cobre metrô, elétricos, ônibus e ferries (€1,60/viagem). Instale o app Carris/Metropolitano.',
     cur:'Lisboa é mais antiga que Roma. Os mouros dominaram a cidade por quase 400 anos (714-1147), e sua influência na arquitetura e nos nomes ainda é visível. Alfama vem do árabe "al-hamma" (as termas).'},
    {id:'li-baixa',t:'16:00',name:'Baixa Pombalina e Praça do Comércio',type:'att',dur:'1h30',icon:'🏛️',
     tp:'A pé do hotel (se no Chiado) ou Metrô até Baixa-Chiado.',
     desc:'A Baixa Pombalina é a parte plana de Lisboa — grelha ortogonal de ruas reconstruída pelo Marquês de Pombal após o Terremoto de 1755 (que destruiu 85% da cidade). A Praça do Comércio (Terreiro do Paço) abre para o Rio Tejo: o arco triunfal e a estátua equestre de D. José I são imponentes. O Rio Tejo aqui parece um mar.',
     tips:'Tome uma Ginjinha no Largo de São Domingos (logo acima da Baixa): €1,50. Rito de passagem em Lisboa. Caminhe pela Rua Augusta até a Praça para a perspectiva completa.',
     cur:'O Terremoto de Lisboa de 1 de novembro de 1755 foi seguido de tsunami e incêndios. O Marquês de Pombal respondeu pragmaticamente: "Enterrem os mortos e cuidem dos vivos" — reconstruiu a cidade em linhas modernas e antisísmicas.'},
    {id:'li-cast',t:'17:30',name:'Castelo de São Jorge',type:'att',dur:'1h30',icon:'🏰',
     tp:'Elétrico 12E da Praça da Figueira até Castelo (€3,00 com Viva Viagem). Ou caminhada de 20 min pela Alfama (subida íngreme).',
     desc:'A fortaleza mourisca que coroa a colina mais alta de Lisboa, com vista panorâmica de 360° sobre a cidade, o Tejo e a Ponte 25 de Abril. Construída pelos mouros no séc. XI, conquistada por D. Afonso Henriques em 1147 com ajuda de cruzados. O interior tem jardins medievais com pavões.',
     tips:'Ingresso: €15. Melhor momento: 1h antes do fechamento, com luz dourada sobre a cidade abaixo. O miradouro nas ameias é a vista mais famosa de Lisboa. Explore a Alfama ao redor.',
     cur:'Alfama é o único bairro de Lisboa que sobreviveu ao terremoto de 1755 relativamente intacto — sua topografia irregular resistiu melhor ao tsunami. Hoje é o bairro do fado e dos gatos.'},
    {id:'li-fado',t:'21:00',name:'Jantar e Fado em Alfama',type:'food',dur:'2h',icon:'🎸',
     tp:'A pé do Castelo descendo pela Alfama.',
     desc:'O fado é a alma musical de Portugal — canção de melancolia, saudade e destino, reconhecida pela UNESCO como Patrimônio Imaterial da Humanidade (2011). O fadista canta acompanhado de viola portuguesa (12 cordas) e viola baixo.',
     tips:'Casas de fado recomendadas em Alfama: Tasca do Chico (íntima, ~€25 consumo mínimo), A Baiuca (mais autêntica, reserva difícil), Sr. Vinho. EVITE os restaurantes com néon "Fado" nas Ramblas (Rua Augusta) — são turísticos e o fado é encenado.',
     cur:'A origem do fado mistura influências árabes, africanas (do lundum brasileiro!), medievais e ciganas de Lisboa do séc. XIX. Amália Rodrigues (1920-1999), a "Rainha do Fado", ainda faz pessoas chorarem com suas gravações.'}
   ]},
   {date:'2026-05-21',dow:'Quinta-feira',label:'Dia 21',theme:'Belém — Torre, Mosteiro e Pastéis',att:[
    {id:'li-bel',t:'09:30',name:'Fábrica de Pastéis de Belém',type:'food',dur:'45min',icon:'🥐',
     tp:'Elétrico 15E de Praça da Figueira (Baixa) até Belém (30 min, €3,00 com Viva Viagem). O 15E é moderno — mais confortável e seguro para bolsas que o histórico 28E.',
     desc:'A Fábrica de Pastéis de Belém (fundada em 1837) é onde nasceu o pastel de nata original, feito com a receita secreta dos monges do Mosteiro dos Jerónimos ao lado. A fila às vezes chega à rua, mas a rotatividade é rápida. Coma na hora, polvilhado de canela e açúcar.',
     tips:'Peça "dois pastéis com canela, por favor" (dois custam ~€2,40). A receita original é mantida em segredo — apenas 3 funcionários a conhecem integralmente. As outras casas de nata em Portugal são deliciosas mas diferentes.',
     cur:'O Pastel de Nata foi criado pelos monges jerónimos no séc. XVIII como forma de usar as claras de ovo que sobravam do amido das roupas religiosas. Quando o mosteiro fechou (1820), venderam a receita a um comerciante local.'},
    {id:'li-jer',t:'10:30',name:'Mosteiro dos Jerónimos',type:'att',dur:'1h30',icon:'⛪',
     tp:'A pé da Fábrica de Pastéis de Belém (5 min).',
     desc:'O maior e mais suntuoso monumento do estilo manuelino português — o "barroco da pedra" que funde gótico com elementos náuticos e exóticos das descobertas marítimas. Construído a partir de 1501 por ordem de D. Manuel I para celebrar a viagem de Vasco da Gama. Aqui estão os túmulos de Vasco da Gama e de Luís de Camões (o maior poeta português).',
     tips:'Ingresso: €15 (gratuito até 12h nos domingos). A ala da Igreja (com os túmulos) é de graça — entre pela porta lateral. O Claustro é o ponto mais fotografado e vale cada euro do ingresso.',
     cur:'A expressão "Manuelino" vem do rei D. Manuel I (1469-1521) — o "rei venturoso" que reinou durante o auge do império marítimo. O estilo mistura gótico tardio com elementos náuticos: cordas, âncoras, esferas armilares e exotica das descobertas.'},

// TWEMOJI — parse emojis after any DOM update
// ═══════════════════════════════════════
function tw(el) {
  if (typeof twemoji !== 'undefined') {
    twemoji.parse(el || document.body, {
      folder: 'svg', ext: '.svg',
      base: 'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/'
    });
  }
}

function renderSB() {
  document.getElementById('sbNav').innerHTML = D.map(d =>
    `<div class="nav-item" style="border-left-color:${d.color}" onclick="goTo('${d.id}')">
      <div class="nav-flag">${d.flag}</div>
      <div class="nav-info">
        <div class="nav-name">${d.name}${d.sub ? ' · ' + d.sub : ''}</div>
        <div class="nav-dates">${d.dates}</div>
      </div>
    </div>`
  ).join('');
  tw(document.getElementById('sb'));
}

function openSb() {
  document.getElementById('sb').classList.add('open');
  document.getElementById('sbOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeSb() {
  document.getElementById('sb').classList.remove('open');
  document.getElementById('sbOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

// ═══════════════════════════════════════
// VIEW TOGGLE
// ═══════════════════════════════════════
function setView(v) {
  view = v;
  document.getElementById('btnL').classList.toggle('on', v === 'list');
  document.getElementById('btnC').classList.toggle('on', v === 'cal');
  // sync mobile topbar buttons
  const bLm = document.getElementById('btnLm');
  const bCm = document.getElementById('btnCm');
  if (bLm) bLm.classList.toggle('on', v === 'list');
  if (bCm) bCm.classList.toggle('on', v === 'cal');
  render();
}

function render() { view === 'list' ? renderList() : renderCal(); }

        <div class="dest-dates">${d.dates}</div>
        <div class="dest-tags">
          <span class="tag">🗣 ${d.lang}</span>
          <span class="tag">💳 ${d.card}</span>

    </div>
    <div class="cult-toggle" onclick="toggleCult('${d.id}')">

      <div class="cult-grid">
        <div class="cult-sec"><h4>🗣 Idioma & Cumprimentos</h4><ul>${d.greetings.map(g=>`<li>${g}</li>`).join('')}</ul></div>

    <div class="legend">${D.map(d=>`<div class="leg-item"><div class="leg-dot" style="background:${d.color}"></div><span style="font-family:'Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif">${d.flag}</span> ${d.name}${d.sub?' · '+d.sub:''}</div>`).join('')}</div>
    <div class="cal-grid">
      ${['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map(w=>`<div class="cal-wd">${w}</div>`).join('')}
      ${''.padStart(firstDay).split('').map(()=>`<div class="cal-day empty"></div>`).join('')}`;

  for (let d = 1; d <= 31; d++) {
    const ds = `2026-05-${String(d).padStart(2,'0')}`;
    const ev = evMap[ds];
    if (ev) {
      const {dest, day} = ev;
      html += `<div class="cal-day live" onclick="jumpTo('${ds}')" style="border-top:3px solid ${dest.color}">
        <div class="cal-dn">${d}</div>
        <div class="cal-city" style="color:${dest.color};font-family:'Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif">${dest.flag} ${dest.name}</div>
        ${day.att.slice(0,3).map(a=>`<div class="cal-ev" style="background:${dest.color}dd">${a.icon} ${a.name.substring(0,18)}${a.name.length>18?'…':''}</div>`).join('')}
      </div>`;
    } else {
      html += `<div class="cal-day"><div class="cal-dn">${d}</div></div>`;
    }
  }
  html += `</div></div>`;
  document.getElementById('main').innerHTML = html;
  tw(document.getElementById('main'));
}

// ═══════════════════════════════════════
// MODAL
// ═══════════════════════════════════════
function openMo(id) {
  const {a, dest, day} = idx[id] || {};
  if (!a) return;
  document.getElementById('moIco').textContent = a.icon;
  document.getElementById('moWhen').textContent = `${a.t || ''}${a.t ? ' · ' : ''}${day.dow}, ${fmtDate(day.date)} · ${dest.flag} ${dest.name}`;
  document.getElementById('moTtl').textContent = a.name;
  document.getElementById('moBody').innerHTML = `
    ${a.tp ? `<div class="mo-transport">
      <span style="font-size:22px">🧭</span>
      <div><div class="mo-tp-lbl">Como Chegar</div><div class="mo-tp-txt">${a.tp}</div></div>
    </div>` : ''}
    ${a.desc ? `<div class="mo-sec"><div class="mo-sec-lbl">Sobre o Local</div><div class="mo-sec-txt">${a.desc}</div></div>` : ''}
    ${a.tips ? `<div class="mo-tips"><span style="font-size:20px">💡</span><div class="mo-tips-in"><div class="lbl">Dicas Práticas</div><div class="txt">${a.tips}</div></div></div>` : ''}
    ${a.cur ? `<div class="mo-cur"><span style="font-size:20px">🔮</span><div class="mo-cur-in"><div class="lbl">Curiosidade</div><div class="txt">${a.cur}</div></div></div>` : ''}
    ${a.dur ? `<div class="mo-foot">⏱ Tempo estimado no local: ${a.dur}</div>` : ''}
  `;
  document.getElementById('mo').classList.add('open');
  tw(document.getElementById('mo'));
}

function closeMoOv(e) { if (e.target === document.getElementById('mo')) closeMo(); }
function closeMo() { document.getElementById('mo').classList.remove('open'); }

// ═══════════════════════════════════════
// NAVIGATION HELPERS
// ═══════════════════════════════════════
function goTo(id) {
  closeSb();
  if (view !== 'list') { setView('list'); setTimeout(() => scrollToDest(id), 200); }
  else scrollToDest(id);
}

function scrollToDest(id) {
  const el = document.getElementById('d-' + id);
  if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
}

function jumpTo(dateStr) {
  setView('list');
  setTimeout(() => {
    for (const dest of D) {
      for (const day of dest.days) {
        if (day.date === dateStr) { scrollToDest(dest.id); return; }
      }
    }
  }, 150);
}

function toggleCult(id) {
  const p = document.getElementById('cult-' + id);
  const a = document.getElementById('arr-' + id);
  p.classList.toggle('open');
  a.textContent = p.classList.contains('open') ? '▲' : '▼';
}

function fmtDate(ds) {
  return new Date(ds + 'T12:00:00').toLocaleDateString('pt-BR', {day:'2-digit', month:'long'});
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMo(); });

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
renderSB();
render();
// Parse emojis after initial render (Twemoji loads async)
if (typeof twemoji !== 'undefined') { tw(); }
else { window.addEventListener('load', () => tw()); }
</script>
</body>
</html>
